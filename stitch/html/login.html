<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>

                    "borderRadius": {
                        "DEFAULT": "0.125rem",

                        "sidebar-collapsed": "64px",

<style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-bg-page min-h-screen flex items-center justify-center p-4 md:p-8">
<div class="flex flex-col xl:flex-row gap-8 items-start justify-center w-full max-w-[1000px]">
<!-- Default State Login Card -->
<div class="w-full max-w-[420px] bg-surface-container-lowest border border-border-subtle rounded flex flex-col p-8 shadow-sm relative mx-auto">
<div class="absolute -top-3 -left-3">
<span class="inline-flex items-center justify-center bg-surface-container-high text-status-neutral font-label text-label px-2 py-1 rounded border border-border-subtle">
                    Standard View
                </span>
</div>
<div class="flex flex-col items-center mb-8">
<div class="w-12 h-12 bg-primary-fixed text-primary flex items-center justify-center rounded mb-4">
<span class="material-symbols-outlined text-[24px]" style="font-variation-settings: 'FILL' 1;">inventory_2</span>
</div>
<h1 class="font-display text-display text-on-surface text-center">Warehouse UserHub</h1>
<p class="font-body-sm text-body-sm text-status-neutral mt-1">Operator Authentication</p>
</div>
<form class="flex flex-col gap-5">
<div class="flex flex-col gap-1.5">
<label class="font-label text-label text-on-surface" for="email-default">Operator Email</label>
<input class="w-full font-body-sm text-body-sm px-3 py-2 border border-outline-variant rounded focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent bg-surface-container-lowest text-on-surface" id="email-default" placeholder="id@warehouse.local" type="email"/>
</div>
<div class="flex flex-col gap-1.5">
<div class="flex justify-between items-center">
<label class="font-label text-label text-on-surface" for="password-default">Secure Key</label>
<a class="font-label text-label text-primary hover:underline" href="#" tabindex="-1">Reset Key</a>
</div>
<input class="w-full font-body-sm text-body-sm px-3 py-2 border border-outline-variant rounded focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent bg-surface-container-lowest text-on-surface" id="password-default" placeholder="••••••••" type="password"/>
</div>
<div class="flex flex-col gap-3 mt-4">
<button class="w-full font-label text-label bg-primary text-on-primary py-2.5 px-4 rounded hover:bg-on-primary-fixed-variant transition-colors flex items-center justify-center gap-2" type="button">
                        Sign in
                        <span class="material-symbols-outlined text-[18px]">login</span>
</button>
<div class="flex items-center gap-3 my-2 opacity-60">
<hr class="flex-1 border-border-subtle"/>
<span class="font-label text-label text-status-neutral uppercase tracking-wider text-[10px]">Or</span>
<hr class="flex-1 border-border-subtle"/>
</div>
<button class="w-full font-label text-label bg-surface-container-lowest border border-border-subtle text-on-surface py-2.5 px-4 rounded hover:bg-surface-container-low transition-colors flex items-center justify-center gap-2" type="button">
<span class="material-symbols-outlined text-[18px]">badge</span>
                        Sign in with SSO
                    </button>
</div>
</form>
</div>
<!-- Error State Login Card -->
<div class="w-full max-w-[420px] bg-surface-container-lowest border border-border-subtle rounded flex flex-col p-8 shadow-sm relative mx-auto">
<div class="absolute -top-3 -left-3">
<span class="inline-flex items-center justify-center bg-error-container text-on-error-container font-label text-label px-2 py-1 rounded border border-error">
                    Error State
                </span>
</div>
<div class="flex flex-col items-center mb-6">
<div class="w-12 h-12 bg-primary-fixed text-primary flex items-center justify-center rounded mb-4">
<span class="material-symbols-outlined text-[24px]" style="font-variation-settings: 'FILL' 1;">inventory_2</span>
</div>
<h1 class="font-display text-display text-on-surface text-center">Warehouse UserHub</h1>
<p class="font-body-sm text-body-sm text-status-neutral mt-1">Operator Authentication</p>
</div>
<!-- Error Banner -->
<div class="bg-error-container border border-error rounded p-3 mb-5 flex items-start gap-3">
<span class="material-symbols-outlined text-error mt-0.5 text-[20px]">warning</span>
<div class="flex flex-col">
<span class="font-label text-label text-on-error-container">Authentication Failed</span>
<span class="font-body-sm text-body-sm text-on-error-container mt-0.5">The credentials provided do not match our records. Please verify and try again.</span>
</div>
</div>
<form class="flex flex-col gap-5">
<div class="flex flex-col gap-1.5">
<label class="font-label text-label text-on-surface" for="email-error">Operator Email</label>
<input class="w-full font-body-sm text-body-sm px-3 py-2 border border-outline-variant rounded focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent bg-surface-container-lowest text-on-surface" id="email-error" type="email" value="operator.smith@warehouse.local"/>
</div>
<div class="flex flex-col gap-1.5">
<div class="flex justify-between items-center">
<label class="font-label text-label text-error" for="password-error">Secure Key</label>
<a class="font-label text-label text-primary hover:underline" href="#" tabindex="-1">Reset Key</a>
</div>
<input class="w-full font-body-sm text-body-sm px-3 py-2 border border-error rounded focus:outline-none focus:ring-2 focus:ring-error focus:border-transparent bg-surface-container-lowest text-on-surface" id="password-error" type="password" value="wrongpassword"/>
<span class="font-body-sm text-body-sm text-error flex items-center gap-1 mt-1 text-[12px]">
<span class="material-symbols-outlined text-[14px]">error</span>
                        Invalid key entry
                    </span>
</div>
<div class="flex flex-col gap-3 mt-4">
<button class="w-full font-label text-label bg-primary text-on-primary py-2.5 px-4 rounded hover:bg-on-primary-fixed-variant transition-colors flex items-center justify-center gap-2" type="button">
                        Sign in
                        <span class="material-symbols-outlined text-[18px]">login</span>
</button>
<div class="flex items-center gap-3 my-2 opacity-60">
<hr class="flex-1 border-border-subtle"/>
<span class="font-label text-label text-status-neutral uppercase tracking-wider text-[10px]">Or</span>
<hr class="flex-1 border-border-subtle"/>
</div>
<button class="w-full font-label text-label bg-surface-container-lowest border border-border-subtle text-on-surface py-2.5 px-4 rounded hover:bg-surface-container-low transition-colors flex items-center justify-center gap-2" type="button">
<span class="material-symbols-outlined text-[18px]">badge</span>
                        Sign in with SSO
                    </button>
</div>
</form>
</div>
</div>
</body></html>
